<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏘️ Grove Street Estates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap");

  :root {
    --bg: #0c0b0a;
    --bg-2: #16140f;
    --surface: #1a1713;
    --surface-2: #221d17;
    --gold: #c9a961;
    --gold-bright: #e8c877;
    --gold-soft: rgba(201, 169, 97, 0.18);
    --gold-hair: rgba(201, 169, 97, 0.25);
    --ivory: #ede6d6;
    --cream: #c8c0ae;
    --muted: #8a8578;
    --dim: #5a564d;
    --sage: #9cb597;
    --burgundy: #b87b7b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    background:
      radial-gradient(ellipse at top, #1a1612 0%, var(--bg) 55%) fixed,
      var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 16px 48px;
    color: var(--ivory);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }
  header::before,
  header::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-hair), transparent);
  }
  header::before { left: -68px; }
  header::after  { right: -68px; }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
    font-size: 2rem;
    color: var(--ivory);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  header h1 .gold {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }
  header p {
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* ── Deck ── */
  #deck {
    position: relative;
    width: 100%;
    max-width: 380px;
    height: 580px;
    margin-bottom: 28px;
  }
  .card {
    position: absolute;
    inset: 0;
    border-radius: 2px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--gold-hair);
    box-shadow:
      0 1px 0 rgba(201, 169, 97, 0.08) inset,
      0 30px 80px rgba(0, 0, 0, 0.7),
      0 10px 24px rgba(0, 0, 0, 0.4);
    cursor: grab;
    user-select: none;
    transition: transform 0.1s, box-shadow 0.25s;
  }
  .card:hover {
    box-shadow:
      0 1px 0 rgba(201, 169, 97, 0.14) inset,
      0 30px 80px rgba(0, 0, 0, 0.75),
      0 0 0 1px rgba(201, 169, 97, 0.35);
  }
  .card:active { cursor: grabbing; }

  .card-photo {
    width: 100%;
    height: 58%;
    object-fit: cover;
    display: block;
    background: var(--surface);
  }
  .card-no-photo {
    width: 100%;
    height: 58%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    color: var(--gold-soft);
    background: linear-gradient(135deg, var(--surface-2), var(--surface));
  }

  .card-info {
    padding: 20px 22px 22px;
    position: relative;
  }
  .card-info::before {
    content: '';
    position: absolute;
    left: 22px; right: 22px; top: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-hair), transparent);
  }
  .card-price {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
    font-size: 1.9rem;
    color: var(--gold);
    letter-spacing: 0.01em;
    line-height: 1;
  }
  .card-address {
    font-size: 0.78rem;
    color: var(--cream);
    margin: 8px 0 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.05em;
    font-weight: 400;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: transparent;
    border: 1px solid var(--gold-hair);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 0.68rem;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .tag.green  { color: var(--sage);     border-color: rgba(156, 181, 151, 0.4); }
  .tag.yellow { color: var(--gold-bright); border-color: rgba(232, 200, 119, 0.4); }
  .tag.red    { color: var(--burgundy); border-color: rgba(184, 123, 123, 0.4); }

  /* Swipe indicators */
  .stamp {
    position: absolute;
    top: 32px;
    padding: 10px 20px;
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: 1.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    border: 1px solid;
    border-radius: 2px;
    background: rgba(12, 11, 10, 0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .stamp.like {
    right: 24px;
    color: var(--sage);
    border-color: var(--sage);
    transform: rotate(-10deg);
  }
  .stamp.nope {
    left: 24px;
    color: var(--burgundy);
    border-color: var(--burgundy);
    transform: rotate(10deg);
  }

  /* ── Buttons ── */
  .buttons {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .btn {
    width: 58px; height: 58px;
    border-radius: 50%;
    border: 1px solid var(--gold-hair);
    background: var(--surface);
    color: var(--ivory);
    font-size: 1.15rem;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .btn:hover { transform: translateY(-2px); }
  .btn.skip:hover  { border-color: var(--burgundy); color: var(--burgundy); }
  .btn.like:hover  { border-color: var(--sage);     color: var(--sage); }
  .btn.info        { border-color: var(--gold);     color: var(--gold); background: transparent; }
  .btn.info:hover  { background: var(--gold-soft); }

  /* ── Counter ── */
  #counter {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 28px;
    text-align: center;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* ── Liked section ── */
  #liked-section {
    width: 100%;
    max-width: 440px;
    margin-top: 8px;
  }
  #liked-section h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--gold);
    margin-bottom: 18px;
    text-align: center;
    letter-spacing: 0.05em;
    position: relative;
    padding-bottom: 14px;
  }
  #liked-section h2::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 32px; height: 1px;
    background: var(--gold-hair);
  }
  .liked-card {
    background: var(--surface);
    border: 1px solid var(--gold-hair);
    border-radius: 2px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .liked-card:hover {
    border-color: rgba(201, 169, 97, 0.5);
    transform: translateY(-1px);
  }
  .liked-thumb {
    width: 64px; height: 64px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface-2);
    border: 1px solid var(--gold-hair);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    color: var(--gold-soft);
    overflow: hidden;
  }
  .liked-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .liked-info { flex: 1; min-width: 0; }
  .liked-price {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
    font-size: 1.05rem;
    color: var(--gold);
    letter-spacing: 0.01em;
  }
  .liked-addr {
    font-size: 0.74rem;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.03em;
    margin-top: 2px;
  }
  .liked-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }
  .liked-link {
    color: var(--gold);
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
    display: inline-block;
    border-bottom: 1px solid var(--gold-hair);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .liked-link:hover { color: var(--gold-bright); border-color: var(--gold-bright); }

  /* Done state */
  #done {
    display: none;
    text-align: center;
    padding: 56px 24px;
  }
  #done h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.8rem;
    color: var(--gold);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }
  #done p {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 400;
  }
  #restart-btn {
    margin-top: 24px;
    padding: 12px 32px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 2px;
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
  }
  #restart-btn:hover {
    background: var(--gold);
    color: var(--bg);
  }

  /* ── Extra fields ── */
  .card-extra {
    font-size: 0.72rem;
    color: var(--muted);
    margin: 8px 0 4px;
    letter-spacing: 0.03em;
  }
  .card-desc {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.55;
    padding-top: 10px;
    font-style: italic;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 400;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    border-top: 1px solid var(--gold-hair);
  }

  /* ── Mortgage section ── */
  .card-mortgage {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--gold-hair);
  }
  .mort-row {
    font-size: 0.72rem;
    color: var(--cream);
    margin-bottom: 3px;
    letter-spacing: 0.02em;
    font-weight: 300;
  }
  .mort-row b { color: var(--ivory); font-weight: 500; }
  .mort-row.highlight {
    color: var(--gold-bright);
    font-size: 0.78rem;
    font-weight: 500;
    font-family: 'Playfair Display', Georgia, serif;
    letter-spacing: 0.03em;
    margin-top: 3px;
  }
  .mort-detail {
    font-size: 0.64rem;
    color: var(--dim);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
</style>
</head>

</div>

// ── Mortgage Calculator ───────────────────────────────────────
function calcMortgage(price, hoaFee) {
  const RATE = 0.0655, DOWN = 0.20, MONTHS = 360;
  const TAX_RATE = 0.0104, INSURANCE = 200, MAINT = 0.01 / 12;
  const loan = price * (1 - DOWN);
  const r = RATE / 12;
  const pi = loan * (r * Math.pow(1+r,MONTHS)) / (Math.pow(1+r,MONTHS)-1);
  const tax = (price * TAX_RATE) / 12;
  const maint = price * MAINT;
  const hoa = hoaFee || 0;
  return {
    down: Math.round(price * DOWN),
    loan: Math.round(loan),
    pi: Math.round(pi),
    total: Math.round(pi + tax + INSURANCE + maint + hoa),
    tax: Math.round(tax),
    maint: Math.round(maint),
    hoa
  };
}

// ── Card HTML ──────────────────────────────────────────────────
function makeCard(listing, zIndex) {
  const div = document.createElement('div');
  div.className = 'card';
  div.style.zIndex = zIndex;
  div.dataset.url = listing.url || '';

  const photo = listing.photo
    ? `<img class="card-photo" src="${listing.photo}" alt="home" onerror="this.parentNode.innerHTML='<div class=card-no-photo>🏠</div>'">`
    : '<div class="card-no-photo">🏠</div>';

  const beds  = listing.beds  ? `🛏 ${listing.beds}bd` : '';
  const baths = listing.baths ? `🚿 ${listing.baths}ba` : '';
  const sqft  = listing.sqft  ? `📐 ${listing.sqft.toLocaleString()} sqft` : '';
  const yb    = listing.year_built ? `Built ${listing.year_built}` : '';
  const dom   = listing.days_on_mls != null ? `${listing.days_on_mls}d listed` : '';
  const hoa   = listing.hoa_fee === 0 ? 'No HOA' :
                listing.hoa_fee     ? `HOA $${listing.hoa_fee}/mo` : '';
  const ppsf  = listing.price_per_sqft ? `$${Math.round(listing.price_per_sqft)}/sqft` : '';

  const domClass = listing.days_on_mls < 7 ? 'green' : listing.days_on_mls > 60 ? 'red' : '';
  const hoaClass = listing.hoa_fee === 0 ? 'green' : '';

  const tags = [beds, baths, sqft, ppsf, yb, dom && `<span class="tag ${domClass}">${dom}</span>`, hoa && `<span class="tag ${hoaClass}">${hoa}</span>`]
    .filter(Boolean)
    .map(t => t.startsWith('<') ? t : `<span class="tag">${t}</span>`)
    .join('');

  const m = calcMortgage(listing.price, listing.hoa_fee);

  // Value badge
  let valueBadgeHtml = '';
  if (listing.value_score != null) {
    if (listing.value_score >= 10)      valueBadgeHtml = '<span class="tag green">🟢 ' + listing.value_score + '% below est.</span>';
    else if (listing.value_score >= 3)  valueBadgeHtml = '<span class="tag yellow">🟡 ' + listing.value_score + '% below est.</span>';
    else if (listing.value_score < -3)  valueBadgeHtml = '<span class="tag red">🔴 ' + Math.abs(listing.value_score) + '% above est.</span>';
  }

  const lotAcres = listing.lot_sqft  ? '🌿 ' + (listing.lot_sqft/43560).toFixed(2) + 'ac lot' : '';
  const garage   = listing.garage    ? '🚗 ' + listing.garage + '-car garage' : '';
  const lastSold = listing.last_sold_price && listing.last_sold_date
    ? 'Last sold $' + listing.last_sold_price.toLocaleString() + ' (' + listing.last_sold_date.slice(0,4) + ')' : '';
  const estVal   = listing.estimated_value ? 'Est. value: $' + listing.estimated_value.toLocaleString() : '';
  const mlsId    = listing.mls_id ? 'MLS: ' + listing.mls_id : '';
  const descHtml = listing.description
    ? '<div class="card-desc">' + listing.description + '</div>' : '';

  const extraRow   = [lotAcres, garage].filter(Boolean).join(' · ');
  const estValRow  = estVal ? ('<div class="mort-row">📊 ' + estVal + (lastSold ? ' · ' + lastSold : '') + '</div>') : '';
  const mlsRow     = mlsId  ? ('<div class="mort-detail">' + mlsId + '</div>') : '';
  const hoaStr     = m.hoa  ? ' + HOA $' + m.hoa : '';

  div.innerHTML = `
    ${photo}
    <div class="card-info">
      <div class="card-price">${formatPrice(listing.price)}</div>
      <div class="card-address">📍 ${listing.address}</div>
      <div class="card-tags">${tags}${valueBadgeHtml}</div>
      ${extraRow ? '<div class="card-extra">' + extraRow + '</div>' : ''}
      <div class="card-mortgage">
        <div class="mort-row">🗺 ${listing.distance_miles} mi Old Town · ~46min DC · ~15min Sterling</div>
        ${estValRow}
        <div class="mort-row">⬇️ Down: <b>$${m.down.toLocaleString()}</b> · 🏦 Loan: $${m.loan.toLocaleString()}</div>
        <div class="mort-row">📅 P&I: ~$${m.pi.toLocaleString()}/mo</div>
        <div class="mort-row highlight">💵 Real Monthly: ~$${m.total.toLocaleString()}/mo</div>
        <div class="mort-detail">(P&I $${m.pi} + tax $${m.tax} + ins ${m.insurance||200} + maint $${m.maint}${hoaStr})</div>
        ${mlsRow}
      </div>
      ${descHtml}
    </div>
    <div class="stamp like">Saved</div>
    <div class="stamp nope">Pass</div>
  `;

  addDragHandlers(div, listing);
  return div;
}

function renderDeck() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  document.getElementById('done').style.display = 'none';
  deck.style.display = '';

  if (!queue.length) {
    document.getElementById('done').style.display = 'block';
    deck.style.display = 'none';
    updateCounter();
    return;
  }

  // Show top 3 cards stacked
  const visible = queue.slice(0, 3);
  visible.reverse().forEach((l, i) => {
    const card = makeCard(l, i + 1);
    if (i < visible.length - 1) {
      const offset = (visible.length - 1 - i) * 6;
      card.style.transform = `translateY(${offset}px) scale(${1 - (visible.length - 1 - i) * 0.03})`;
    }
    deck.appendChild(card);
  });

  updateCounter();
}

function updateCounter() {
  const el = document.getElementById('counter');
  el.textContent = queue.length
    ? `${queue.length} home${queue.length !== 1 ? 's' : ''} left · ${liked.length} saved`
    : `${liked.length} saved`;
}

// ── Swipe logic ────────────────────────────────────────────────
let startX, startY, isDragging = false;
let activeCard = null;

function addDragHandlers(card, listing) {
  const onStart = (x, y) => {
    startX = x; startY = y; isDragging = true; activeCard = card;
  };
  const onMove = (x, y) => {
    if (!isDragging || activeCard !== card) return;
    const dx = x - startX;
    const dy = y - startY;
    const rot = dx * 0.08;
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    const like = card.querySelector('.stamp.like');
    const nope = card.querySelector('.stamp.nope');
    if (dx > 30)  { like.style.opacity = Math.min((dx - 30) / 80, 1); nope.style.opacity = 0; }
    else if (dx < -30) { nope.style.opacity = Math.min((-dx - 30) / 80, 1); like.style.opacity = 0; }
    else { like.style.opacity = 0; nope.style.opacity = 0; }
  };
  const onEnd = (x) => {
    if (!isDragging || activeCard !== card) return;
    isDragging = false;
    const dx = x - startX;
    if (dx > 80)       animateOut(card, listing, 'right');
    else if (dx < -80) animateOut(card, listing, 'left');
    else { card.style.transform = ''; }
  };

  // Mouse
  card.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   e => onEnd(e.clientX));

  // Touch
  card.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  card.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX));
}

function animateOut(card, listing, dir) {
  const x = dir === 'right' ? 600 : -600;
  card.style.transition = 'transform 0.35s ease';
  card.style.transform  = `translateX(${x}px) rotate(${dir === 'right' ? 25 : -25}deg)`;
  setTimeout(() => {
    queue.shift();
    if (dir === 'right') saveLike(listing);
    // Track seen
    const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
    if (listing.url) seen.push(listing.url);
    localStorage.setItem('amy_seen', JSON.stringify(seen.slice(-200)));
    renderDeck();

  }, 350);
}

function swipe(dir) {
  if (!queue.length) return;
  const deck = document.getElementById('deck');
  const cards = deck.querySelectorAll('.card');
  const top = cards[cards.length - 1];
  if (!top) return;
  animateOut(top, queue[0], dir);
}

  if (!queue.length) return;
  const url = queue[0].url;
  if (url) window.open(url, '_blank');
}

function restart() {
  localStorage.removeItem('amy_seen');
  queue = [...LISTINGS];
  renderDeck();
}

// ── Liked ──────────────────────────────────────────────────────
function saveLike(listing) {
  if (!liked.some(l => l.url === listing.url)) {
    liked.unshift(listing);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(liked));
  }
}

function renderLiked() {
  const list   = document.getElementById('liked-list');
  const header = document.getElementById('liked-header');
  if (!liked.length) { list.innerHTML = ''; header.style.display = 'none'; return; }

  header.style.display = 'block';
  list.innerHTML = liked.map(l => {
    const thumb = l.photo
      ? `<div class="liked-thumb"><img src="${l.photo}" alt="home"></div>`
      : `<div class="liked-thumb">🏠</div>`;
    const meta = [
      l.beds  ? `${l.beds}bd` : '',
      l.baths ? `${l.baths}ba` : '',
      l.sqft  ? `${l.sqft.toLocaleString()} sqft` : '',
      l.year_built ? `Built ${l.year_built}` : '',
    ].filter(Boolean).join(' · ');
    const lm = calcMortgage(l.price, l.hoa_fee);

    return `
      <div class="liked-card">
        ${thumb}
        <div class="liked-info">
          <div class="liked-price">${formatPrice(l.price)}</div>
          <div class="liked-addr">${l.address}</div>
          <div class="liked-meta">${meta}</div>
          <div class="liked-meta">⬇️ $${lm.down.toLocaleString()} down · 💵 ~$${lm.total.toLocaleString()}/mo</div>
          <a class="liked-link" href="${l.url}" target="_blank">View listing →</a>
        </div>
      </div>
    `;
  }).join('');

  updateCounter();
}

init();
</script>
</body>
</html>
