<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏘️ Grove Street Estates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap");

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Share Tech Mono', monospace;
    background: #0a0a0a;
    border-top: 3px solid #ff6b00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    color: #e0e0e0;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #ff6b00;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,107,0,0.5);
  }
  header p { color: #888; font-size: 0.82rem; margin-top: 6px; letter-spacing: 1px; }

  /* ── Deck ── */
  #deck {
    position: relative;
    width: 100%;
    max-width: 380px;
    height: 560px;
    margin-bottom: 24px;
  }

  .card {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    cursor: grab;
    user-select: none;
    transition: transform 0.1s;
    background: #141414;
    border: 1px solid #ff6b00;
  }
  .card:hover {
    box-shadow: 0 0 24px rgba(255,107,0,0.4), 0 20px 60px rgba(0,0,0,0.8);
  }
  .card:active { cursor: grabbing; }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .card-photo {
    width: 100%;
    height: 62%;
    object-fit: cover;
    display: block;
    background: #141414;
  }
  .card-no-photo {
    width: 100%;
    height: 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: linear-gradient(135deg, #1a1a1a, #141414);
  }

  .card-info {
    padding: 16px;
  }
  .card-price {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #ff6b00;
    text-shadow: 0 0 8px rgba(255,107,0,0.4);
    letter-spacing: 1px;
  }
  .card-address {
    font-size: 0.82rem;
    color: #bbb;
    margin: 4px 0 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: rgba(255,107,0,0.08);
    border: 1px solid rgba(255,107,0,0.3);
    border-radius: 2px;
    padding: 3px 8px;
    font-size: 0.76rem;
    color: #ccc;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag.green { background: rgba(57,255,20,0.08); border-color: rgba(57,255,20,0.4); color: #39ff14; }
  .tag.yellow { background: rgba(255,200,0,0.08); border-color: rgba(255,200,0,0.3); color: #ffd700; }
  .tag.red { background: rgba(204,0,0,0.15); border-color: rgba(204,0,0,0.5); color: #ff4444; }

  /* Swipe indicators */
  .stamp {
    position: absolute;
    top: 30px;
    padding: 8px 18px;
    border-radius: 2px;
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    border: 4px solid;
    transform: rotate(-15deg);
  }
  .stamp.like  {
    right: 20px;
    color: #39ff14;
    border-color: #39ff14;
    text-shadow: 0 0 12px #39ff14;
    box-shadow: 0 0 16px rgba(57,255,20,0.3);
    transform: rotate(-15deg);
  }
  .stamp.nope  {
    left: 20px;
    color: #cc0000;
    border-color: #cc0000;
    text-shadow: 0 0 12px #cc0000;
    box-shadow: 0 0 16px rgba(204,0,0,0.3);
    transform: rotate(15deg);
  }

  /* ── Buttons ── */
  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .btn {
    width: 64px; height: 64px;
    border-radius: 3px;
    border: 2px solid transparent;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:hover { transform: scale(1.12); }
  .btn.skip  {
    background: #1a0000;
    border-color: #cc0000;
    color: #cc0000;
    box-shadow: 0 4px 16px rgba(204,0,0,0.3);
  }
  .btn.skip:hover { box-shadow: 0 0 20px rgba(204,0,0,0.6); }
  .btn.like  {
    background: #001a00;
    border-color: #39ff14;
    color: #39ff14;
    box-shadow: 0 4px 16px rgba(57,255,20,0.3);
  }
  .btn.like:hover { box-shadow: 0 0 20px rgba(57,255,20,0.6); }
  .btn.info  {
    background: #1a0d00;
    border-color: #ff6b00;
    color: #ff6b00;
    box-shadow: 0 4px 16px rgba(255,107,0,0.3);
    font-size: 1.2rem;
  }
  .btn.info:hover { box-shadow: 0 0 20px rgba(255,107,0,0.6); }

  /* ── Counter ── */
  #counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: #ff6b00;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Liked section ── */
  #liked-section {
    width: 100%;
    max-width: 420px;
    margin-top: 8px;
  }
  #liked-section h2 {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #39ff14;
    text-shadow: 0 0 10px rgba(57,255,20,0.5);
    margin-bottom: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .liked-card {
    background: #141414;
    border: 1px solid #ff6b00;
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .liked-thumb {
    width: 60px; height: 60px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    background: #1a1a1a;
    border: 1px solid rgba(255,107,0,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .liked-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
  .liked-info { flex: 1; min-width: 0; }
  .liked-price {
    font-family: 'Oswald', Impact, sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #ff6b00;
    letter-spacing: 1px;
  }
  .liked-addr  { font-size: 0.76rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
  .liked-meta  { font-size: 0.73rem; color: #666; margin-top: 2px; }
  .liked-link  { color: #39ff14; text-decoration: none; font-size: 0.78rem; letter-spacing: 0.5px; }
  .liked-link:hover { text-shadow: 0 0 8px rgba(57,255,20,0.6); }

  /* Done state */
  #done {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  #done h2 {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #ff6b00;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 16px rgba(255,107,0,0.6);
    margin-bottom: 8px;
  }
  #done p  { color: #666; font-size: 0.85rem; letter-spacing: 1px; }
  #restart-btn {
    margin-top: 16px;
    padding: 10px 28px;
    background: transparent;
    border: 2px solid #ff6b00;
    border-radius: 2px;
    color: #ff6b00;
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: box-shadow 0.15s, background 0.15s;
  }
  #restart-btn:hover {
    background: rgba(255,107,0,0.1);
    box-shadow: 0 0 16px rgba(255,107,0,0.5);
  }
</style>
</head>
<body>

<header>
  <h1>🏘️ Grove Street Estates</h1>
  <p>Leesburg, VA · No Buster Zone · Swipe to Claim Your Turf</p>
</header>

<div id="deck"></div>
<div id="counter"></div>

<div class="buttons">
  <button class="btn skip" onclick="swipe('left')"  title="Skip">✗</button>
  <button class="btn info" onclick="openLink()"      title="View listing">🔗</button>
  <button class="btn like" onclick="swipe('right')" title="Save">♥</button>
</div>

<div id="done">
  <h2>Mission Complete 💯</h2>
  <p>You've seen all available homes.</p>
  <button id="restart-btn" onclick="restart()">Run It Again</button>
</div>

<div id="liked-section">
  <h2 id="liked-header" style="display:none">🟢 YOUR CREW'S SPOTS</h2>
  <div id="liked-list"></div>
</div>

<script>
const LISTINGS = [{"address":"1211 Musket Ct NE, Leesburg, VA, 20176","price":725000,"distance_miles":1.4,"beds":4,"baths":3,"sqft":3064,"year_built":1988,"days_on_mls":5,"hoa_fee":54,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/1211-Musket-Ct-NE_Leesburg_VA_20176_M60014-98732","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-27 14:01:35","price_per_sqft":237,"photo":"https://ap.rdcpix.com/24f70dc03dd583a901fe0d0f638457e5l-m3840923357od-w480_h360_x2.webp?w=1080&q=75"},{"address":"1226 Barksdale Dr NE, Leesburg, VA, 20176","price":899900,"distance_miles":1.7,"beds":4,"baths":2,"sqft":2944,"year_built":1999,"days_on_mls":6,"hoa_fee":68,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/1226-Barksdale-Dr-NE_Leesburg_VA_20176_M58670-05945","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-26 12:21:11","price_per_sqft":306,"photo":"https://ap.rdcpix.com/005e2e04cd38ce613b825d9326043dbfl-m294913248od-w480_h360_x2.webp?w=1080&q=75"},{"address":"905 Tuscarora Dr SW, Leesburg, VA, 20175","price":749900,"distance_miles":1.2,"beds":4,"baths":3,"sqft":2084,"year_built":1965,"days_on_mls":7,"hoa_fee":0,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/905-Tuscarora-Dr-SW_Leesburg_VA_20175_M52255-03560","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-25 13:35:14","price_per_sqft":360,"photo":"https://ap.rdcpix.com/361f5329b2ea75ec882a6ae6dca4785dl-m1772396447od-w480_h360_x2.webp?w=1080&q=75"},{"address":"608 Diskin Pl SW, Leesburg, VA, 20175","price":989000,"distance_miles":2.7,"beds":4,"baths":3,"sqft":3724,"year_built":1996,"days_on_mls":17,"hoa_fee":89,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/608-Diskin-Pl-SW_Leesburg_VA_20175_M67234-45537","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-15 06:24:09","price_per_sqft":266,"photo":"https://ap.rdcpix.com/f207216258715be1094819f90c0d1fd8l-m1550368135od-w480_h360_x2.webp?w=1080&q=75"},{"address":"224 Lawford Dr SW, Leesburg, VA, 20175","price":885000,"distance_miles":2.1,"beds":4,"baths":3,"sqft":3190,"year_built":1997,"days_on_mls":27,"hoa_fee":65,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/224-Lawford-Dr-SW_Leesburg_VA_20175_M53694-61896","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-05 17:25:47","price_per_sqft":277,"photo":"https://ap.rdcpix.com/6f250dcab3f281251fe31dfe564c7eeel-m585935429od-w480_h360_x2.webp?w=1080&q=75"},{"address":"212 Masons Ln SE, Leesburg, VA, 20175","price":725000,"distance_miles":2.2,"beds":2,"baths":2,"sqft":1878,"year_built":1960,"days_on_mls":38,"hoa_fee":0,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/212-Masons-Ln-SE_Leesburg_VA_20175_M57995-09803","source":"realtor.com","status":"FOR_SALE","list_date":"2026-02-21 23:15:50","price_per_sqft":386,"photo":"https://ap.rdcpix.com/9f9964d81426c3724e5fd8ab7830f385l-m536367976od-w480_h360_x2.webp?w=1080&q=75"}];
const STORAGE_KEY = 'amy_liked_v2';

let queue = [];
let liked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// ── Init ──────────────────────────────────────────────────────
function init() {
  // Filter out already-seen
  const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
  queue = LISTINGS.filter(l => !seen.includes(l.url));
  if (!queue.length) queue = [...LISTINGS]; // reset if all seen

  renderDeck();
  renderLiked();
}

function formatPrice(p) {
  return '$' + p.toLocaleString();
}

// ── Card HTML ──────────────────────────────────────────────────
function makeCard(listing, zIndex) {
  const div = document.createElement('div');
  div.className = 'card';
  div.style.zIndex = zIndex;
  div.dataset.url = listing.url || '';

  const photo = listing.photo
    ? `<img class="card-photo" src="${listing.photo}" alt="home" onerror="this.parentNode.innerHTML='<div class=card-no-photo>🏠</div>'">`
    : '<div class="card-no-photo">🏠</div>';

  const beds  = listing.beds  ? `🛏 ${listing.beds}bd` : '';
  const baths = listing.baths ? `🚿 ${listing.baths}ba` : '';
  const sqft  = listing.sqft  ? `📐 ${listing.sqft.toLocaleString()} sqft` : '';
  const yb    = listing.year_built ? `Built ${listing.year_built}` : '';
  const dom   = listing.days_on_mls != null ? `${listing.days_on_mls}d listed` : '';
  const hoa   = listing.hoa_fee === 0 ? 'No HOA' :
                listing.hoa_fee     ? `HOA $${listing.hoa_fee}/mo` : '';
  const ppsf  = listing.price_per_sqft ? `$${Math.round(listing.price_per_sqft)}/sqft` : '';

  const domClass = listing.days_on_mls < 7 ? 'green' : listing.days_on_mls > 60 ? 'red' : '';
  const hoaClass = listing.hoa_fee === 0 ? 'green' : '';

  const tags = [beds, baths, sqft, ppsf, yb, dom && `<span class="tag ${domClass}">${dom}</span>`, hoa && `<span class="tag ${hoaClass}">${hoa}</span>`]
    .filter(Boolean)
    .map(t => t.startsWith('<') ? t : `<span class="tag">${t}</span>`)
    .join('');

  div.innerHTML = `
    ${photo}
    <div class="card-info">
      <div class="card-price">${formatPrice(listing.price)}</div>
      <div class="card-address">📍 ${listing.address}</div>
      <div class="card-tags">${tags}</div>
    </div>
    <div class="stamp like">SAVE ♥</div>
    <div class="stamp nope">SKIP ✗</div>
  `;

  addDragHandlers(div, listing);
  return div;
}

function renderDeck() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  document.getElementById('done').style.display = 'none';
  deck.style.display = '';

  if (!queue.length) {
    document.getElementById('done').style.display = 'block';
    deck.style.display = 'none';
    updateCounter();
    return;
  }

  // Show top 3 cards stacked
  const visible = queue.slice(0, 3);
  visible.reverse().forEach((l, i) => {
    const card = makeCard(l, i + 1);
    if (i < visible.length - 1) {
      const offset = (visible.length - 1 - i) * 6;
      card.style.transform = `translateY(${offset}px) scale(${1 - (visible.length - 1 - i) * 0.03})`;
    }
    deck.appendChild(card);
  });

  updateCounter();
}

function updateCounter() {
  const el = document.getElementById('counter');
  el.textContent = queue.length
    ? `${queue.length} home${queue.length !== 1 ? 's' : ''} left · ${liked.length} saved`
    : `${liked.length} saved`;
}

// ── Swipe logic ────────────────────────────────────────────────
let startX, startY, isDragging = false;
let activeCard = null;

function addDragHandlers(card, listing) {
  const onStart = (x, y) => {
    startX = x; startY = y; isDragging = true; activeCard = card;
  };
  const onMove = (x, y) => {
    if (!isDragging || activeCard !== card) return;
    const dx = x - startX;
    const dy = y - startY;
    const rot = dx * 0.08;
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    const like = card.querySelector('.stamp.like');
    const nope = card.querySelector('.stamp.nope');
    if (dx > 30)  { like.style.opacity = Math.min((dx - 30) / 80, 1); nope.style.opacity = 0; }
    else if (dx < -30) { nope.style.opacity = Math.min((-dx - 30) / 80, 1); like.style.opacity = 0; }
    else { like.style.opacity = 0; nope.style.opacity = 0; }
  };
  const onEnd = (x) => {
    if (!isDragging || activeCard !== card) return;
    isDragging = false;
    const dx = x - startX;
    if (dx > 80)       animateOut(card, listing, 'right');
    else if (dx < -80) animateOut(card, listing, 'left');
    else { card.style.transform = ''; }
  };

  // Mouse
  card.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   e => onEnd(e.clientX));

  // Touch
  card.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  card.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX));
}

function animateOut(card, listing, dir) {
  const x = dir === 'right' ? 600 : -600;
  card.style.transition = 'transform 0.35s ease';
  card.style.transform  = `translateX(${x}px) rotate(${dir === 'right' ? 25 : -25}deg)`;
  setTimeout(() => {
    queue.shift();
    if (dir === 'right') saveLike(listing);
    // Track seen
    const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
    if (listing.url) seen.push(listing.url);
    localStorage.setItem('amy_seen', JSON.stringify(seen.slice(-200)));
    renderDeck();
    renderLiked();
  }, 350);
}

function swipe(dir) {
  if (!queue.length) return;
  const deck = document.getElementById('deck');
  const cards = deck.querySelectorAll('.card');
  const top = cards[cards.length - 1];
  if (!top) return;
  animateOut(top, queue[0], dir);
}

function openLink() {
  if (!queue.length) return;
  const url = queue[0].url;
  if (url) window.open(url, '_blank');
}

function restart() {
  localStorage.removeItem('amy_seen');
  queue = [...LISTINGS];
  renderDeck();
}

// ── Liked ──────────────────────────────────────────────────────
function saveLike(listing) {
  if (!liked.some(l => l.url === listing.url)) {
    liked.unshift(listing);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(liked));
  }
}

function renderLiked() {
  const list   = document.getElementById('liked-list');
  const header = document.getElementById('liked-header');
  if (!liked.length) { list.innerHTML = ''; header.style.display = 'none'; return; }

  header.style.display = 'block';
  list.innerHTML = liked.map(l => {
    const thumb = l.photo
      ? `<div class="liked-thumb"><img src="${l.photo}" alt="home"></div>`
      : `<div class="liked-thumb">🏠</div>`;
    const meta = [
      l.beds  ? `${l.beds}bd` : '',
      l.baths ? `${l.baths}ba` : '',
      l.sqft  ? `${l.sqft.toLocaleString()} sqft` : '',
      l.year_built ? `Built ${l.year_built}` : '',
    ].filter(Boolean).join(' · ');

    return `
      <div class="liked-card">
        ${thumb}
        <div class="liked-info">
          <div class="liked-price">${formatPrice(l.price)}</div>
          <div class="liked-addr">${l.address}</div>
          <div class="liked-meta">${meta}</div>
          <a class="liked-link" href="${l.url}" target="_blank">View listing →</a>
        </div>
      </div>
    `;
  }).join('');

  updateCounter();
}

init();
</script>
</body>
</html>
