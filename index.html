<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏠 Amy — Leesburg Homes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    color: #fff;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; }
  header p  { color: #aaa; font-size: 0.85rem; margin-top: 4px; }

  /* ── Deck ── */
  #deck {
    position: relative;
    width: 100%;
    max-width: 380px;
    height: 560px;
    margin-bottom: 24px;
  }

  .card {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    cursor: grab;
    user-select: none;
    transition: transform 0.1s;
    background: #16213e;
  }
  .card:active { cursor: grabbing; }

  .card-photo {
    width: 100%;
    height: 62%;
    object-fit: cover;
    display: block;
    background: #16213e;
  }
  .card-no-photo {
    width: 100%;
    height: 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: linear-gradient(135deg, #0f3460, #16213e);
  }

  .card-info {
    padding: 16px;
  }
  .card-price {
    font-size: 1.7rem;
    font-weight: 800;
    color: #e94560;
  }
  .card-address {
    font-size: 0.85rem;
    color: #ccc;
    margin: 4px 0 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.78rem;
    color: #ddd;
  }
  .tag.green { background: rgba(0,200,100,0.2); color: #5fffb0; }
  .tag.yellow { background: rgba(255,200,0,0.15); color: #ffe066; }
  .tag.red { background: rgba(255,80,80,0.2); color: #ff8a8a; }

  /* Swipe indicators */
  .stamp {
    position: absolute;
    top: 30px;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    border: 4px solid;
    transform: rotate(-15deg);
  }
  .stamp.like  { right: 20px; color: #5fffb0; border-color: #5fffb0; transform: rotate(-15deg); }
  .stamp.nope  { left: 20px;  color: #ff4d6d; border-color: #ff4d6d; transform: rotate(15deg); }

  /* ── Buttons ── */
  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:hover { transform: scale(1.12); }
  .btn.skip  { background: #ff4d6d; box-shadow: 0 6px 20px rgba(255,77,109,0.4); }
  .btn.like  { background: #5fffb0; box-shadow: 0 6px 20px rgba(95,255,176,0.4); }
  .btn.info  { background: #4a90e2; box-shadow: 0 6px 20px rgba(74,144,226,0.4); font-size: 1.2rem; }

  /* ── Counter ── */
  #counter {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 20px;
    text-align: center;
  }

  /* ── Liked section ── */
  #liked-section {
    width: 100%;
    max-width: 420px;
    margin-top: 8px;
  }
  #liked-section h2 {
    font-size: 1rem;
    color: #5fffb0;
    margin-bottom: 12px;
    text-align: center;
  }
  .liked-card {
    background: #16213e;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .liked-thumb {
    width: 60px; height: 60px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: #0f3460;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .liked-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .liked-info { flex: 1; min-width: 0; }
  .liked-price { font-weight: 700; font-size: 1rem; color: #e94560; }
  .liked-addr  { font-size: 0.78rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .liked-meta  { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .liked-link  { color: #4a90e2; text-decoration: none; font-size: 0.8rem; }

  /* Done state */
  #done {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  #done h2 { font-size: 1.4rem; margin-bottom: 8px; }
  #done p  { color: #888; }
  #restart-btn {
    margin-top: 16px;
    padding: 10px 24px;
    background: #e94560;
    border: none; border-radius: 24px;
    color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>🏠 Amy's Picks</h1>
  <p>Leesburg VA · SFH Only · $500K–$1M · Swipe to explore</p>
</header>

<div id="deck"></div>
<div id="counter"></div>

<div class="buttons">
  <button class="btn skip" onclick="swipe('left')"  title="Skip">✗</button>
  <button class="btn info" onclick="openLink()"      title="View listing">🔗</button>
  <button class="btn like" onclick="swipe('right')" title="Save">♥</button>
</div>

<div id="done">
  <h2>All done! 🎉</h2>
  <p>You've seen all available homes.</p>
  <button id="restart-btn" onclick="restart()">Start Over</button>
</div>

<div id="liked-section">
  <h2 id="liked-header" style="display:none">❤️ Saved Homes</h2>
  <div id="liked-list"></div>
</div>

<script>
const LISTINGS = [{"address":"1211 Musket Ct NE, Leesburg, VA, 20176","price":725000,"distance_miles":1.4,"beds":4,"baths":3,"sqft":3064,"year_built":1988,"days_on_mls":1,"hoa_fee":54,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/1211-Musket-Ct-NE_Leesburg_VA_20176_M60014-98732","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-27 14:01:35","price_per_sqft":237,"photo":"https://ap.rdcpix.com/24f70dc03dd583a901fe0d0f638457e5l-m3840923357od-w480_h360_x2.webp?w=1080&q=75"},{"address":"40246 Thomas Mill Rd, Leesburg, VA, 20175","price":750000,"distance_miles":2.5,"beds":3,"baths":3,"sqft":2621,"year_built":1978,"days_on_mls":1,"hoa_fee":0,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/40246-Thomas-Mill-Rd_Leesburg_VA_20175_M67567-98556","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-26 22:05:25","price_per_sqft":286,"photo":"https://ap.rdcpix.com/5bb18414ccd7bdf7f4025fa09c2b097dl-m2973800841od-w480_h360_x2.webp?w=1080&q=75"},{"address":"557 Rockbridge Dr SE, Leesburg, VA, 20175","price":525000,"distance_miles":0.9,"beds":4,"baths":2,"sqft":1549,"year_built":1984,"days_on_mls":2,"hoa_fee":32,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/557-Rockbridge-Dr-SE_Leesburg_VA_20175_M56940-40888","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-25 22:35:38","price_per_sqft":339,"photo":"https://ap.rdcpix.com/66b4556bf956a5636e4690ed67535530l-m3111725784od-w480_h360_x2.webp?w=1080&q=75"},{"address":"905 Tuscarora Dr SW, Leesburg, VA, 20175","price":749900,"distance_miles":1.2,"beds":4,"baths":3,"sqft":2084,"year_built":1965,"days_on_mls":3,"hoa_fee":0,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/905-Tuscarora-Dr-SW_Leesburg_VA_20175_M52255-03560","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-25 13:35:14","price_per_sqft":360,"photo":"https://ap.rdcpix.com/361f5329b2ea75ec882a6ae6dca4785dl-m1772396447od-w480_h360_x2.webp?w=1080&q=75"},{"address":"810 Wage Dr SW, Leesburg, VA, 20175","price":650000,"distance_miles":1.2,"beds":3,"baths":3,"sqft":1872,"year_built":1965,"days_on_mls":4,"hoa_fee":0,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/810-Wage-Dr-SW_Leesburg_VA_20175_M54237-72529","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-23 18:58:04","price_per_sqft":347,"photo":"https://ap.rdcpix.com/386a3cafa7422d97e715f07deb0bc90al-m300309847od-w480_h360_x2.webp?w=1080&q=75"},{"address":"429 Deerpath Ave SW, Leesburg, VA, 20175","price":799500,"distance_miles":1.3,"beds":4,"baths":3,"sqft":3263,"year_built":1988,"days_on_mls":9,"hoa_fee":84,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/429-Deerpath-Ave-SW_Leesburg_VA_20175_M62412-66919","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-18 19:36:04","price_per_sqft":245,"photo":"https://ap.rdcpix.com/3012bfa015cbd26fdc94a763bdbaae57l-m1206584361od-w480_h360_x2.webp?w=1080&q=75"},{"address":"828 Anthony Ct SE, Leesburg, VA, 20175","price":949000,"distance_miles":2.7,"beds":4,"baths":2,"sqft":2660,"year_built":2002,"days_on_mls":10,"hoa_fee":79,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/828-Anthony-Ct-SE_Leesburg_VA_20175_M52236-52675","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-17 20:50:50","price_per_sqft":357,"photo":"https://ap.rdcpix.com/59cb89da8870acec3327260cbe6b3dedl-m4093636931od-w480_h360_x2.webp?w=1080&q=75"},{"address":"608 Diskin Pl SW, Leesburg, VA, 20175","price":989000,"distance_miles":2.7,"beds":4,"baths":3,"sqft":3724,"year_built":1996,"days_on_mls":13,"hoa_fee":89,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/608-Diskin-Pl-SW_Leesburg_VA_20175_M67234-45537","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-15 06:24:09","price_per_sqft":266,"photo":"https://ap.rdcpix.com/f207216258715be1094819f90c0d1fd8l-m1550368135od-w480_h360_x2.webp?w=1080&q=75"},{"address":"406 Blue Ridge Ave NE, Leesburg, VA, 20176","price":849989,"distance_miles":0.6,"beds":4,"baths":3,"sqft":2584,"year_built":1984,"days_on_mls":25,"hoa_fee":null,"new_construction":false,"url":"https://www.realtor.com/realestateandhomes-detail/406-Blue-Ridge-Ave-NE_Leesburg_VA_20176_M50450-99285","source":"realtor.com","status":"FOR_SALE","list_date":"2026-03-02 17:36:10","price_per_sqft":329,"photo":"https://ap.rdcpix.com/663fad6dd1cd6519555162cbf8984022l-m1723664141od-w480_h360_x2.webp?w=1080&q=75"}];
const STORAGE_KEY = 'amy_liked_v2';

let queue = [];
let liked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// ── Init ──────────────────────────────────────────────────────
function init() {
  // Filter out already-seen
  const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
  queue = LISTINGS.filter(l => !seen.includes(l.url));
  if (!queue.length) queue = [...LISTINGS]; // reset if all seen

  renderDeck();
  renderLiked();
}

function formatPrice(p) {
  return '$' + p.toLocaleString();
}

// ── Card HTML ──────────────────────────────────────────────────
function makeCard(listing, zIndex) {
  const div = document.createElement('div');
  div.className = 'card';
  div.style.zIndex = zIndex;
  div.dataset.url = listing.url || '';

  const photo = listing.photo
    ? `<img class="card-photo" src="${listing.photo}" alt="home" onerror="this.parentNode.innerHTML='<div class=card-no-photo>🏠</div>'">`
    : '<div class="card-no-photo">🏠</div>';

  const beds  = listing.beds  ? `🛏 ${listing.beds}bd` : '';
  const baths = listing.baths ? `🚿 ${listing.baths}ba` : '';
  const sqft  = listing.sqft  ? `📐 ${listing.sqft.toLocaleString()} sqft` : '';
  const yb    = listing.year_built ? `Built ${listing.year_built}` : '';
  const dom   = listing.days_on_mls != null ? `${listing.days_on_mls}d listed` : '';
  const hoa   = listing.hoa_fee === 0 ? 'No HOA' :
                listing.hoa_fee     ? `HOA $${listing.hoa_fee}/mo` : '';
  const ppsf  = listing.price_per_sqft ? `$${Math.round(listing.price_per_sqft)}/sqft` : '';

  const domClass = listing.days_on_mls < 7 ? 'green' : listing.days_on_mls > 60 ? 'red' : '';
  const hoaClass = listing.hoa_fee === 0 ? 'green' : '';

  const tags = [beds, baths, sqft, ppsf, yb, dom && `<span class="tag ${domClass}">${dom}</span>`, hoa && `<span class="tag ${hoaClass}">${hoa}</span>`]
    .filter(Boolean)
    .map(t => t.startsWith('<') ? t : `<span class="tag">${t}</span>`)
    .join('');

  div.innerHTML = `
    ${photo}
    <div class="card-info">
      <div class="card-price">${formatPrice(listing.price)}</div>
      <div class="card-address">📍 ${listing.address}</div>
      <div class="card-tags">${tags}</div>
    </div>
    <div class="stamp like">SAVE ♥</div>
    <div class="stamp nope">SKIP ✗</div>
  `;

  addDragHandlers(div, listing);
  return div;
}

function renderDeck() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  document.getElementById('done').style.display = 'none';
  deck.style.display = '';

  if (!queue.length) {
    document.getElementById('done').style.display = 'block';
    deck.style.display = 'none';
    updateCounter();
    return;
  }

  // Show top 3 cards stacked
  const visible = queue.slice(0, 3);
  visible.reverse().forEach((l, i) => {
    const card = makeCard(l, i + 1);
    if (i < visible.length - 1) {
      const offset = (visible.length - 1 - i) * 6;
      card.style.transform = `translateY(${offset}px) scale(${1 - (visible.length - 1 - i) * 0.03})`;
    }
    deck.appendChild(card);
  });

  updateCounter();
}

function updateCounter() {
  const el = document.getElementById('counter');
  el.textContent = queue.length
    ? `${queue.length} home${queue.length !== 1 ? 's' : ''} left · ${liked.length} saved`
    : `${liked.length} saved`;
}

// ── Swipe logic ────────────────────────────────────────────────
let startX, startY, isDragging = false;
let activeCard = null;

function addDragHandlers(card, listing) {
  const onStart = (x, y) => {
    startX = x; startY = y; isDragging = true; activeCard = card;
  };
  const onMove = (x, y) => {
    if (!isDragging || activeCard !== card) return;
    const dx = x - startX;
    const dy = y - startY;
    const rot = dx * 0.08;
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    const like = card.querySelector('.stamp.like');
    const nope = card.querySelector('.stamp.nope');
    if (dx > 30)  { like.style.opacity = Math.min((dx - 30) / 80, 1); nope.style.opacity = 0; }
    else if (dx < -30) { nope.style.opacity = Math.min((-dx - 30) / 80, 1); like.style.opacity = 0; }
    else { like.style.opacity = 0; nope.style.opacity = 0; }
  };
  const onEnd = (x) => {
    if (!isDragging || activeCard !== card) return;
    isDragging = false;
    const dx = x - startX;
    if (dx > 80)       animateOut(card, listing, 'right');
    else if (dx < -80) animateOut(card, listing, 'left');
    else { card.style.transform = ''; }
  };

  // Mouse
  card.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   e => onEnd(e.clientX));

  // Touch
  card.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  card.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX));
}

function animateOut(card, listing, dir) {
  const x = dir === 'right' ? 600 : -600;
  card.style.transition = 'transform 0.35s ease';
  card.style.transform  = `translateX(${x}px) rotate(${dir === 'right' ? 25 : -25}deg)`;
  setTimeout(() => {
    queue.shift();
    if (dir === 'right') saveLike(listing);
    // Track seen
    const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
    if (listing.url) seen.push(listing.url);
    localStorage.setItem('amy_seen', JSON.stringify(seen.slice(-200)));
    renderDeck();
    renderLiked();
  }, 350);
}

function swipe(dir) {
  if (!queue.length) return;
  const deck = document.getElementById('deck');
  const cards = deck.querySelectorAll('.card');
  const top = cards[cards.length - 1];
  if (!top) return;
  animateOut(top, queue[0], dir);
}

function openLink() {
  if (!queue.length) return;
  const url = queue[0].url;
  if (url) window.open(url, '_blank');
}

function restart() {
  localStorage.removeItem('amy_seen');
  queue = [...LISTINGS];
  renderDeck();
}

// ── Liked ──────────────────────────────────────────────────────
function saveLike(listing) {
  if (!liked.some(l => l.url === listing.url)) {
    liked.unshift(listing);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(liked));
  }
}

function renderLiked() {
  const list   = document.getElementById('liked-list');
  const header = document.getElementById('liked-header');
  if (!liked.length) { list.innerHTML = ''; header.style.display = 'none'; return; }

  header.style.display = 'block';
  list.innerHTML = liked.map(l => {
    const thumb = l.photo
      ? `<div class="liked-thumb"><img src="${l.photo}" alt="home"></div>`
      : `<div class="liked-thumb">🏠</div>`;
    const meta = [
      l.beds  ? `${l.beds}bd` : '',
      l.baths ? `${l.baths}ba` : '',
      l.sqft  ? `${l.sqft.toLocaleString()} sqft` : '',
      l.year_built ? `Built ${l.year_built}` : '',
    ].filter(Boolean).join(' · ');

    return `
      <div class="liked-card">
        ${thumb}
        <div class="liked-info">
          <div class="liked-price">${formatPrice(l.price)}</div>
          <div class="liked-addr">${l.address}</div>
          <div class="liked-meta">${meta}</div>
          <a class="liked-link" href="${l.url}" target="_blank">View listing →</a>
        </div>
      </div>
    `;
  }).join('');

  updateCounter();
}

init();
</script>
</body>
</html>
