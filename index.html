<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏘️ Grove Street Estates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap");

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Share Tech Mono', monospace;
    background: #0a0a0a;
    border-top: 3px solid #ff6b00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    color: #e0e0e0;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #ff6b00;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,107,0,0.5);
  }
  header p { color: #888; font-size: 0.82rem; margin-top: 6px; letter-spacing: 1px; }

  /* ── Deck ── */
  #deck {
    position: relative;
    width: 100%;
    max-width: 380px;
    height: 560px;
    margin-bottom: 24px;
  }

  .card {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    cursor: grab;
    user-select: none;
    transition: transform 0.1s;
    background: #141414;
    border: 1px solid #ff6b00;
  }
  .card:hover {
    box-shadow: 0 0 24px rgba(255,107,0,0.4), 0 20px 60px rgba(0,0,0,0.8);
  }
  .card:active { cursor: grabbing; }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .card-photo {
    width: 100%;
    height: 62%;
    object-fit: cover;
    display: block;
    background: #141414;
  }
  .card-no-photo {
    width: 100%;
    height: 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: linear-gradient(135deg, #1a1a1a, #141414);
  }

  .card-info {
    padding: 16px;
  }
  .card-price {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #ff6b00;
    text-shadow: 0 0 8px rgba(255,107,0,0.4);
    letter-spacing: 1px;
  }
  .card-address {
    font-size: 0.82rem;
    color: #bbb;
    margin: 4px 0 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: rgba(255,107,0,0.08);
    border: 1px solid rgba(255,107,0,0.3);
    border-radius: 2px;
    padding: 3px 8px;
    font-size: 0.76rem;
    color: #ccc;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag.green { background: rgba(57,255,20,0.08); border-color: rgba(57,255,20,0.4); color: #39ff14; }
  .tag.yellow { background: rgba(255,200,0,0.08); border-color: rgba(255,200,0,0.3); color: #ffd700; }
  .tag.red { background: rgba(204,0,0,0.15); border-color: rgba(204,0,0,0.5); color: #ff4444; }

  /* Swipe indicators */
  .stamp {
    position: absolute;
    top: 30px;
    padding: 8px 18px;
    border-radius: 2px;
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    border: 4px solid;
    transform: rotate(-15deg);
  }
  .stamp.like  {
    right: 20px;
    color: #39ff14;
    border-color: #39ff14;
    text-shadow: 0 0 12px #39ff14;
    box-shadow: 0 0 16px rgba(57,255,20,0.3);
    transform: rotate(-15deg);
  }
  .stamp.nope  {
    left: 20px;
    color: #cc0000;
    border-color: #cc0000;
    text-shadow: 0 0 12px #cc0000;
    box-shadow: 0 0 16px rgba(204,0,0,0.3);
    transform: rotate(15deg);
  }

  /* ── Buttons ── */
  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .btn {
    width: 64px; height: 64px;
    border-radius: 3px;
    border: 2px solid transparent;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:hover { transform: scale(1.12); }
  .btn.skip  {
    background: #1a0000;
    border-color: #cc0000;
    color: #cc0000;
    box-shadow: 0 4px 16px rgba(204,0,0,0.3);
  }
  .btn.skip:hover { box-shadow: 0 0 20px rgba(204,0,0,0.6); }
  .btn.like  {
    background: #001a00;
    border-color: #39ff14;
    color: #39ff14;
    box-shadow: 0 4px 16px rgba(57,255,20,0.3);
  }
  .btn.like:hover { box-shadow: 0 0 20px rgba(57,255,20,0.6); }
  .btn.info  {
    background: #1a0d00;
    border-color: #ff6b00;
    color: #ff6b00;
    box-shadow: 0 4px 16px rgba(255,107,0,0.3);
    font-size: 1.2rem;
  }
  .btn.info:hover { box-shadow: 0 0 20px rgba(255,107,0,0.6); }

  /* ── Counter ── */
  #counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: #ff6b00;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Liked section ── */
  #liked-section {
    width: 100%;
    max-width: 420px;
    margin-top: 8px;
  }
  #liked-section h2 {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #39ff14;
    text-shadow: 0 0 10px rgba(57,255,20,0.5);
    margin-bottom: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .liked-card {
    background: #141414;
    border: 1px solid #ff6b00;
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .liked-thumb {
    width: 60px; height: 60px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    background: #1a1a1a;
    border: 1px solid rgba(255,107,0,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .liked-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
  .liked-info { flex: 1; min-width: 0; }
  .liked-price {
    font-family: 'Oswald', Impact, sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #ff6b00;
    letter-spacing: 1px;
  }
  .liked-addr  { font-size: 0.76rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
  .liked-meta  { font-size: 0.73rem; color: #666; margin-top: 2px; }
  .liked-link  { color: #39ff14; text-decoration: none; font-size: 0.78rem; letter-spacing: 0.5px; }
  .liked-link:hover { text-shadow: 0 0 8px rgba(57,255,20,0.6); }

  /* Done state */
  #done {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  #done h2 {
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #ff6b00;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 16px rgba(255,107,0,0.6);
    margin-bottom: 8px;
  }
  #done p  { color: #666; font-size: 0.85rem; letter-spacing: 1px; }
  #restart-btn {
    margin-top: 16px;
    padding: 10px 28px;
    background: transparent;
    border: 2px solid #ff6b00;
    border-radius: 2px;
    color: #ff6b00;
    font-family: 'Oswald', Impact, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: box-shadow 0.15s, background 0.15s;
  }
  #restart-btn:hover {
    background: rgba(255,107,0,0.1);
    box-shadow: 0 0 16px rgba(255,107,0,0.5);
  }

  /* ── Extra fields ── */
  .card-extra {
    font-size: 0.74rem;
    color: #888;
    margin: 4px 0;
    letter-spacing: 0.3px;
  }
  .card-desc {
    font-size: 0.70rem;
    color: #555;
    margin-top: 6px;
    line-height: 1.4;
    border-top: 1px solid rgba(255,107,0,0.1);
    padding-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Mortgage section ── */
  .card-mortgage {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,107,0,0.2);
  }
  .mort-row {
    font-size: 0.75rem;
    color: #bbb;
    margin-bottom: 2px;
    letter-spacing: 0.3px;
  }
  .mort-row b { color: #fff; }
  .mort-row.highlight {
    color: #39ff14;
    font-size: 0.82rem;
    font-weight: bold;
    text-shadow: 0 0 6px rgba(57,255,20,0.4);
  }
  .mort-detail {
    font-size: 0.68rem;
    color: #555;
    margin-top: 2px;
  }
</style>
</head>

// ── Mortgage Calculator ───────────────────────────────────────
function calcMortgage(price, hoaFee) {
  const RATE = 0.0655, DOWN = 0.20, MONTHS = 360;
  const TAX_RATE = 0.0104, INSURANCE = 200, MAINT = 0.01 / 12;
  const loan = price * (1 - DOWN);
  const r = RATE / 12;
  const pi = loan * (r * Math.pow(1+r,MONTHS)) / (Math.pow(1+r,MONTHS)-1);
  const tax = (price * TAX_RATE) / 12;
  const maint = price * MAINT;
  const hoa = hoaFee || 0;
  return {
    down: Math.round(price * DOWN),
    loan: Math.round(loan),
    pi: Math.round(pi),
    total: Math.round(pi + tax + INSURANCE + maint + hoa),
    tax: Math.round(tax),
    maint: Math.round(maint),
    hoa
  };
}
const STORAGE_KEY = 'amy_liked_v2';

let queue = [];
let liked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// ── Init ──────────────────────────────────────────────────────
function init() {
  // Filter out already-seen
  const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
  queue = LISTINGS.filter(l => !seen.includes(l.url));
  if (!queue.length) queue = [...LISTINGS]; // reset if all seen

  renderDeck();
  renderLiked();
}

function formatPrice(p) {
  return '$' + p.toLocaleString();
}

// ── Card HTML ──────────────────────────────────────────────────
function makeCard(listing, zIndex) {
  const div = document.createElement('div');
  div.className = 'card';
  div.style.zIndex = zIndex;
  div.dataset.url = listing.url || '';

  const photo = listing.photo
    ? `<img class="card-photo" src="${listing.photo}" alt="home" onerror="this.parentNode.innerHTML='<div class=card-no-photo>🏠</div>'">`
    : '<div class="card-no-photo">🏠</div>';

  const beds  = listing.beds  ? `🛏 ${listing.beds}bd` : '';
  const baths = listing.baths ? `🚿 ${listing.baths}ba` : '';
  const sqft  = listing.sqft  ? `📐 ${listing.sqft.toLocaleString()} sqft` : '';
  const yb    = listing.year_built ? `Built ${listing.year_built}` : '';
  const dom   = listing.days_on_mls != null ? `${listing.days_on_mls}d listed` : '';
  const hoa   = listing.hoa_fee === 0 ? 'No HOA' :
                listing.hoa_fee     ? `HOA $${listing.hoa_fee}/mo` : '';
  const ppsf  = listing.price_per_sqft ? `$${Math.round(listing.price_per_sqft)}/sqft` : '';

  const domClass = listing.days_on_mls < 7 ? 'green' : listing.days_on_mls > 60 ? 'red' : '';
  const hoaClass = listing.hoa_fee === 0 ? 'green' : '';

  const tags = [beds, baths, sqft, ppsf, yb, dom && `<span class="tag ${domClass}">${dom}</span>`, hoa && `<span class="tag ${hoaClass}">${hoa}</span>`]
    .filter(Boolean)
    .map(t => t.startsWith('<') ? t : `<span class="tag">${t}</span>`)
    .join('');

  const m = calcMortgage(listing.price, listing.hoa_fee);

  // Value badge
  let valueBadgeHtml = '';
  if (listing.value_score != null) {
    if (listing.value_score >= 10)      valueBadgeHtml = '<span class="tag green">🟢 ' + listing.value_score + '% below est.</span>';
    else if (listing.value_score >= 3)  valueBadgeHtml = '<span class="tag yellow">🟡 ' + listing.value_score + '% below est.</span>';
    else if (listing.value_score < -3)  valueBadgeHtml = '<span class="tag red">🔴 ' + Math.abs(listing.value_score) + '% above est.</span>';
  }

  const lotAcres = listing.lot_sqft  ? '🌿 ' + (listing.lot_sqft/43560).toFixed(2) + 'ac lot' : '';
  const garage   = listing.garage    ? '🚗 ' + listing.garage + '-car garage' : '';
  const lastSold = listing.last_sold_price && listing.last_sold_date
    ? 'Last sold $' + listing.last_sold_price.toLocaleString() + ' (' + listing.last_sold_date.slice(0,4) + ')' : '';
  const estVal   = listing.estimated_value ? 'Est. value: $' + listing.estimated_value.toLocaleString() : '';
  const mlsId    = listing.mls_id ? 'MLS: ' + listing.mls_id : '';
  const descHtml = listing.description
    ? '<div class="card-desc">' + listing.description + '</div>' : '';

  const extraRow   = [lotAcres, garage].filter(Boolean).join(' · ');
  const estValRow  = estVal ? ('<div class="mort-row">📊 ' + estVal + (lastSold ? ' · ' + lastSold : '') + '</div>') : '';
  const mlsRow     = mlsId  ? ('<div class="mort-detail">' + mlsId + '</div>') : '';
  const hoaStr     = m.hoa  ? ' + HOA $' + m.hoa : '';

  div.innerHTML = `
    ${photo}
    <div class="card-info">
      <div class="card-price">${formatPrice(listing.price)}</div>
      <div class="card-address">📍 ${listing.address}</div>
      <div class="card-tags">${tags}${valueBadgeHtml}</div>
      ${extraRow ? '<div class="card-extra">' + extraRow + '</div>' : ''}
      <div class="card-mortgage">
        <div class="mort-row">🗺 ${listing.distance_miles} mi Old Town · ~46min DC · ~15min Sterling</div>
        ${estValRow}
        <div class="mort-row">⬇️ Down: <b>$${m.down.toLocaleString()}</b> · 🏦 Loan: $${m.loan.toLocaleString()}</div>
        <div class="mort-row">📅 P&I: ~$${m.pi.toLocaleString()}/mo</div>
        <div class="mort-row highlight">💵 Real Monthly: ~$${m.total.toLocaleString()}/mo</div>
        <div class="mort-detail">(P&I $${m.pi} + tax $${m.tax} + ins ${m.insurance||200} + maint $${m.maint}${hoaStr})</div>
        ${mlsRow}
      </div>
      ${descHtml}
    </div>
    <div class="stamp like">SAVE ♥</div>
    <div class="stamp nope">SKIP ✗</div>
  `;

  addDragHandlers(div, listing);
  return div;
}

function renderDeck() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  document.getElementById('done').style.display = 'none';
  deck.style.display = '';

  if (!queue.length) {
    document.getElementById('done').style.display = 'block';
    deck.style.display = 'none';
    updateCounter();
    return;
  }

  // Show top 3 cards stacked
  const visible = queue.slice(0, 3);
  visible.reverse().forEach((l, i) => {
    const card = makeCard(l, i + 1);
    if (i < visible.length - 1) {
      const offset = (visible.length - 1 - i) * 6;
      card.style.transform = `translateY(${offset}px) scale(${1 - (visible.length - 1 - i) * 0.03})`;
    }
    deck.appendChild(card);
  });

  updateCounter();
}

function updateCounter() {
  const el = document.getElementById('counter');
  el.textContent = queue.length
    ? `${queue.length} home${queue.length !== 1 ? 's' : ''} left · ${liked.length} saved`
    : `${liked.length} saved`;
}

// ── Swipe logic ────────────────────────────────────────────────
let startX, startY, isDragging = false;
let activeCard = null;

function addDragHandlers(card, listing) {
  const onStart = (x, y) => {
    startX = x; startY = y; isDragging = true; activeCard = card;
  };
  const onMove = (x, y) => {
    if (!isDragging || activeCard !== card) return;
    const dx = x - startX;
    const dy = y - startY;
    const rot = dx * 0.08;
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    const like = card.querySelector('.stamp.like');
    const nope = card.querySelector('.stamp.nope');
    if (dx > 30)  { like.style.opacity = Math.min((dx - 30) / 80, 1); nope.style.opacity = 0; }
    else if (dx < -30) { nope.style.opacity = Math.min((-dx - 30) / 80, 1); like.style.opacity = 0; }
    else { like.style.opacity = 0; nope.style.opacity = 0; }
  };
  const onEnd = (x) => {
    if (!isDragging || activeCard !== card) return;
    isDragging = false;
    const dx = x - startX;
    if (dx > 80)       animateOut(card, listing, 'right');
    else if (dx < -80) animateOut(card, listing, 'left');
    else { card.style.transform = ''; }
  };

  // Mouse
  card.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   e => onEnd(e.clientX));

  // Touch
  card.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  card.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX));
}

function animateOut(card, listing, dir) {
  const x = dir === 'right' ? 600 : -600;
  card.style.transition = 'transform 0.35s ease';
  card.style.transform  = `translateX(${x}px) rotate(${dir === 'right' ? 25 : -25}deg)`;
  setTimeout(() => {
    queue.shift();
    if (dir === 'right') saveLike(listing);
    // Track seen
    const seen = JSON.parse(localStorage.getItem('amy_seen') || '[]');
    if (listing.url) seen.push(listing.url);
    localStorage.setItem('amy_seen', JSON.stringify(seen.slice(-200)));
    renderDeck();
    renderLiked();
  }, 350);
}

function swipe(dir) {
  if (!queue.length) return;
  const deck = document.getElementById('deck');
  const cards = deck.querySelectorAll('.card');
  const top = cards[cards.length - 1];
  if (!top) return;
  animateOut(top, queue[0], dir);
}

function openLink() {
  if (!queue.length) return;
  const url = queue[0].url;
  if (url) window.open(url, '_blank');
}

function restart() {
  localStorage.removeItem('amy_seen');
  queue = [...LISTINGS];
  renderDeck();
}

// ── Liked ──────────────────────────────────────────────────────
function saveLike(listing) {
  if (!liked.some(l => l.url === listing.url)) {
    liked.unshift(listing);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(liked));
  }
}

function renderLiked() {
  const list   = document.getElementById('liked-list');
  const header = document.getElementById('liked-header');
  if (!liked.length) { list.innerHTML = ''; header.style.display = 'none'; return; }

  header.style.display = 'block';
  list.innerHTML = liked.map(l => {
    const thumb = l.photo
      ? `<div class="liked-thumb"><img src="${l.photo}" alt="home"></div>`
      : `<div class="liked-thumb">🏠</div>`;
    const meta = [
      l.beds  ? `${l.beds}bd` : '',
      l.baths ? `${l.baths}ba` : '',
      l.sqft  ? `${l.sqft.toLocaleString()} sqft` : '',
      l.year_built ? `Built ${l.year_built}` : '',
    ].filter(Boolean).join(' · ');
    const lm = calcMortgage(l.price, l.hoa_fee);

    return `
      <div class="liked-card">
        ${thumb}
        <div class="liked-info">
          <div class="liked-price">${formatPrice(l.price)}</div>
          <div class="liked-addr">${l.address}</div>
          <div class="liked-meta">${meta}</div>
          <div class="liked-meta">⬇️ $${lm.down.toLocaleString()} down · 💵 ~$${lm.total.toLocaleString()}/mo</div>
          <a class="liked-link" href="${l.url}" target="_blank">View listing →</a>
        </div>
      </div>
    `;
  }).join('');

  updateCounter();
}

init();
</script>
